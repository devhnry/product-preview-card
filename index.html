<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/vite.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./public/favicon-32x32.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/style.css">
    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <main>
      <section class="container">

        <picture class="product__mobile">
          <img src="./src/images/image-product-mobile.jpg" alt="product-img" class="product__img">
        </picture>
        <picture class="product__desktop">
          <img src="./src/images/image-product-desktop.jpg" alt="product-img" class="product__img">
        </picture>

        <div class="product">
          <p class="product__title f-body">PERFUME</p>
          <h1 class="product__header f-header">
            Gabrielle Essence Eau De Parfum</h1>
          <p class="product__desc f-body">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
          <div class="prices">
            <p class="new-price f-header">$149.99</p>
            <p class="old-price f-body">
              $169.99
            </p>
          </div>
          <button class="button">Add to Cart
          </button>
        </div>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
